# Reference AML/ATF spec for a Canadian Schedule I bank.
# Illustrative only — thresholds and typologies must be tuned per institution.
# Aligned with PCMLTFA, PCMLTFR, FINTRAC guidance, and OSFI Guideline B-8.

version: 1

program:
  name: canadian_bank_aml
  jurisdiction: CA
  regulator: FINTRAC
  owner: chief_compliance_officer
  effective_date: 2026-01-01

data_contracts:
  - id: txn
    source: raw.transactions
    freshness_sla: 1h
    columns:
      - { name: txn_id,      type: string,    nullable: false, pii: false }
      - { name: customer_id, type: string,    nullable: false, pii: true  }
      - { name: amount,      type: decimal,   nullable: false, constraints: [">0"] }
      - { name: currency,    type: string,    nullable: false }
      - { name: channel,     type: string,    enum: [cash, wire, ach, card, eft] }
      - { name: direction,   type: string,    enum: [in, out] }
      - { name: booked_at,   type: timestamp, nullable: false }
    quality_checks:
      - { not_null: [txn_id, customer_id, amount, booked_at] }
      - { unique:   [txn_id] }

  - id: customer
    source: raw.customers
    freshness_sla: 24h
    columns:
      - { name: customer_id, type: string,    nullable: false, pii: true }
      - { name: full_name,   type: string,    nullable: false, pii: true }
      - { name: country,     type: string,    nullable: false }
      - { name: risk_rating, type: string,    enum: [low, medium, high] }
      - { name: onboarded_at, type: timestamp, nullable: false }

rules:
  # --- Structuring: cash deposits just below LCTR threshold (CAD $10,000) ---
  - id: structuring_cash_deposits
    name: Cash structuring — deposits below LCTR $10,000 threshold
    severity: high
    regulation_refs:
      - citation: "PCMLTFA s.11.1"
        description: "Structuring offence — splitting transactions to avoid reporting."
      - citation: "PCMLTFR s.7(1)"
        description: "LCTR filing obligation for cash transactions of $10,000+ CAD."
      - citation: "PCMLTFR s.132"
        description: "24-hour aggregation rule for cash transactions."
    logic:
      type: aggregation_window
      source: txn
      filter:
        channel: cash
        direction: in
        amount: { between: [5000, 9999] }
      group_by: [customer_id]
      window: 30d
      having:
        count:      { gte: 3 }
        sum_amount: { gte: 20000 }
    escalate_to: l1_analyst
    evidence:
      - all_matching_transactions
      - customer_kyc_profile
      - prior_alerts_90d
    tags: [structuring, cash, lctr]

  # --- Rapid movement: cash in followed by outgoing EFT/wire ---
  - id: rapid_movement_cash_to_eft
    name: Rapid movement — cash in followed by outgoing EFT
    severity: medium
    regulation_refs:
      - citation: "FINTRAC Operational Alert 2016-01"
        description: "Pass-through typology — layering through Canadian accounts."
      - citation: "PCMLTFR s.12(1)"
        description: "EFT reporting for cross-border transfers of $10,000+ CAD."
    logic:
      type: aggregation_window
      source: txn
      filter:
        channel: { in: [cash, wire, eft] }
      group_by: [customer_id]
      window: 7d
      having:
        sum_amount: { gte: 50000 }
        count:      { gte: 4 }
    escalate_to: l1_analyst
    evidence:
      - all_matching_transactions
      - customer_kyc_profile
    tags: [rapid_movement, layering, eft]

  # --- High-risk jurisdiction: FATF grey/black list countries ---
  - id: high_risk_jurisdiction
    name: Significant activity from FATF high-risk jurisdiction
    severity: high
    regulation_refs:
      - citation: "PCMLTFA s.9.4"
        description: "Correspondent banking and high-risk country due diligence."
      - citation: "FINTRAC Guideline 8A"
        description: "Risk assessment — geographic risk factors."
      - citation: "OSFI Guideline B-8 s.4"
        description: "Enhanced due diligence for higher-risk geographies."
    logic:
      type: custom_sql
      sql: |
        SELECT
            'high_risk_jurisdiction' AS rule_id,
            t.customer_id,
            COUNT(*) AS count,
            SUM(t.amount) AS sum_amount,
            MIN(t.booked_at) AS window_start,
            MAX(t.booked_at) AS window_end
        FROM txn t
        JOIN customer c ON t.customer_id = c.customer_id
        WHERE c.country IN ('RU', 'IR', 'KP', 'MM', 'SY')
          AND t.booked_at >= TIMESTAMP '{window_start}'
          AND t.booked_at <  TIMESTAMP '{as_of}'
        GROUP BY t.customer_id
        HAVING SUM(t.amount) >= 5000
        ORDER BY t.customer_id
    escalate_to: l2_investigator
    evidence:
      - all_matching_transactions
      - customer_kyc_profile
      - jurisdiction_risk_assessment
    tags: [high_risk_jurisdiction, geographic_risk]

  # --- Large Cash Transaction (LCTR threshold: CAD $10,000/day) ---
  - id: large_cash_lctr
    name: Cash activity exceeding LCTR threshold ($10,000 CAD/day)
    severity: medium
    regulation_refs:
      - citation: "PCMLTFR s.7(1)"
        description: "LCTR filing obligation for cash transactions of $10,000+ CAD."
      - citation: "PCMLTFR s.132"
        description: "24-hour aggregation rule — multiple transactions totalling $10,000+."
    logic:
      type: aggregation_window
      source: txn
      filter:
        channel: cash
      group_by: [customer_id]
      window: 1d
      having:
        sum_amount: { gte: 10000 }
    escalate_to: l1_analyst
    evidence:
      - all_matching_transactions
      - customer_kyc_profile
    tags: [lctr, cash, regulatory_reporting]

  # --- Unusual volume spike ---
  - id: unusual_volume_spike
    name: Unusual volume spike — recent activity far exceeds baseline
    severity: medium
    regulation_refs:
      - citation: "PCMLTFA s.7"
        description: "STR obligation — transactions inconsistent with client profile."
      - citation: "PCMLTFR s.123.1"
        description: "Ongoing monitoring of business relationships."
    logic:
      type: custom_sql
      sql: |
        WITH recent AS (
            SELECT customer_id, SUM(amount) AS recent_total
            FROM txn
            WHERE booked_at >= TIMESTAMP '{recent_start}'
              AND booked_at <  TIMESTAMP '{as_of}'
            GROUP BY customer_id
        ),
        baseline AS (
            SELECT customer_id, SUM(amount) / 4.0 AS weekly_avg
            FROM txn
            WHERE booked_at >= TIMESTAMP '{baseline_start}'
              AND booked_at <  TIMESTAMP '{recent_start}'
            GROUP BY customer_id
            HAVING COUNT(*) >= 2
        )
        SELECT
            'unusual_volume_spike' AS rule_id,
            r.customer_id,
            r.recent_total AS sum_amount,
            b.weekly_avg AS baseline_avg,
            r.recent_total / NULLIF(b.weekly_avg, 0) AS spike_ratio,
            TIMESTAMP '{recent_start}' AS window_start,
            TIMESTAMP '{as_of}' AS window_end
        FROM recent r
        JOIN baseline b ON r.customer_id = b.customer_id
        WHERE r.recent_total > b.weekly_avg * 5
          AND r.recent_total >= 5000
        ORDER BY r.customer_id
    escalate_to: l1_analyst
    evidence:
      - all_matching_transactions
      - customer_kyc_profile
      - historical_transaction_profile
    tags: [unusual_activity, behavioral]

  # --- Dormant account reactivation ---
  - id: dormant_account_activity
    name: Dormant account reactivation with large transaction
    severity: high
    regulation_refs:
      - citation: "PCMLTFA s.7"
        description: "STR obligation — dormant accounts with sudden large transactions."
      - citation: "FINTRAC ML/TF Indicators"
        description: "Dormant account suddenly reactivated with significant activity."
    logic:
      type: custom_sql
      sql: |
        WITH last_activity AS (
            SELECT customer_id, MAX(booked_at) AS last_txn_date
            FROM txn
            WHERE booked_at < TIMESTAMP '{dormant_cutoff}'
            GROUP BY customer_id
        ),
        recent_large AS (
            SELECT customer_id, SUM(amount) AS sum_amount,
                   COUNT(*) AS count,
                   MIN(booked_at) AS window_start,
                   MAX(booked_at) AS window_end
            FROM txn
            WHERE booked_at >= TIMESTAMP '{dormant_cutoff}'
              AND booked_at <  TIMESTAMP '{as_of}'
              AND amount >= 10000
            GROUP BY customer_id
        )
        SELECT
            'dormant_account_activity' AS rule_id,
            r.customer_id,
            r.sum_amount,
            r.count,
            r.window_start,
            r.window_end
        FROM recent_large r
        JOIN last_activity la ON r.customer_id = la.customer_id
        ORDER BY r.customer_id
    escalate_to: l2_investigator
    evidence:
      - all_matching_transactions
      - customer_kyc_profile
      - account_activity_history
    tags: [dormant_account, behavioral]

workflow:
  queues:
    - id: l1_analyst
      sla: 24h
      next: [l2_investigator, closed_no_action]
    - id: l2_investigator
      sla: 72h
      next: [str_filing, closed_no_action]
    - id: str_filing
      sla: 30d
      regulator_form: FINTRAC_STR
    - id: closed_no_action
      sla: 24h

reporting:
  forms:
    FINTRAC_STR:
      template: fintrac_str_v1
      mandatory_fields: [subject, narrative, triggering_rules, transactions]
    FINTRAC_LCTR:
      template: fintrac_lctr_v1
      trigger:
        channel: cash
        aggregate_day: { gte: 10000 }
    FINTRAC_EFTR:
      template: fintrac_eftr_v1
      trigger:
        channel: { in: [wire, eft] }
        direction: out
        cross_border: true
        amount: { gte: 10000 }

retention_policy:
  evidence: 5y
  alerts: 5y
  case_decisions: 5y
  raw_transactions: 5y
  client_identification: 5y

# ---------------------------------------------------------------------------
# Business metrics & reporting
# ---------------------------------------------------------------------------

metrics:
  - id: alert_volume_total
    name: Total alerts produced
    category: operational
    audience: [director, manager, analyst, developer]
    owner: head_of_financial_crime_ops
    formula:
      type: count
      source: alerts
    thresholds:
      green: { lte: 50 }
      amber: { between: [51, 200] }
      red:   { gt: 200 }

  - id: high_severity_alert_ratio
    name: High-severity alert share
    category: risk
    audience: [svp, vp, director]
    owner: chief_compliance_officer
    unit: "%"
    formula:
      type: ratio
      numerator:
        type: count
        source: alerts
        filter: { rule_id: { in: [structuring_cash_deposits] } }
      denominator:
        type: count
        source: alerts
    target: { lte: 0.6 }
    thresholds:
      green: { lte: 0.6 }
      amber: { lte: 0.85 }
      red:   { gt:  0.85 }

  - id: typology_coverage
    name: Typology coverage — rules that fired / all tagged rules
    category: effectiveness
    audience: [vp, director, manager]
    owner: chief_compliance_officer
    unit: "%"
    formula:
      type: coverage
      universe: typologies
      covered_by: rule_tags
    target: { gte: 0.5 }
    thresholds:
      green: { gte: 0.5 }
      amber: { gte: 0.25 }
      red:   { lt:  0.25 }

  - id: cases_opened
    name: Cases opened this run
    category: operational
    audience: [manager, analyst, developer]
    owner: head_of_financial_crime_ops
    formula:
      type: count
      source: cases

  - id: cases_routed_to_l1
    name: Cases routed to L1 analyst queue
    category: operational
    audience: [manager, pm]
    owner: l1_team_lead
    formula:
      type: count
      source: cases
      filter: { queue: l1_analyst }

  - id: distinct_customers_alerted
    name: Distinct customers alerted
    category: risk
    audience: [vp, director, business]
    owner: chief_compliance_officer
    formula:
      type: count
      source: alerts
      distinct_by: customer_id

  - id: transaction_volume_cad
    name: Total transaction volume screened
    category: operational
    audience: [director, manager, business, developer]
    owner: data_platform_lead
    unit: CAD
    formula:
      type: sum
      source: txn
      field: amount

  - id: high_severity_rules_active
    name: Active high-severity rules
    category: delivery
    audience: [pm, developer, vp]
    owner: aml_program_manager
    formula:
      type: count
      source: rules
      filter: { severity: high, status: active }
    thresholds:
      green: { gte: 2 }
      amber: { eq: 1 }
      red:   { eq: 0 }

  - id: rules_active_count
    name: Total active rules deployed
    category: delivery
    audience: [svp, vp, director, pm, developer]
    owner: aml_program_manager
    formula:
      type: count
      source: rules
      filter: { status: active }
    thresholds:
      green: { gte: 5 }
      amber: { gte: 3 }
      red:   { lt: 3 }

  - id: false_positive_rate
    name: Estimated false positive rate
    category: effectiveness
    audience: [svp, vp, director, manager]
    owner: chief_compliance_officer
    unit: "%"
    formula:
      type: sql
      sql: "SELECT 1.0 - (CAST(str_count AS FLOAT) / NULLIF(total, 0)) FROM ..."
    target: { lte: 0.85 }
    thresholds:
      green: { lte: 0.7 }
      amber: { lte: 0.85 }
      red:   { gt:  0.85 }

  - id: alert_to_str_rate
    name: Alert-to-STR conversion rate
    description: Proportion of alerts escalated to STR filing queue
    category: regulatory
    audience: [svp, vp, director]
    owner: chief_compliance_officer
    unit: "%"
    formula:
      type: ratio
      numerator:
        type: count
        source: cases
        filter: { status: str_filing }
      denominator:
        type: count
        source: alerts
    target: { gte: 0.1 }
    thresholds:
      green: { gte: 0.1 }
      amber: { gte: 0.05 }
      red:   { lt:  0.05 }

  - id: sla_compliance_rate
    name: SLA compliance rate
    category: operational
    audience: [manager, director, vp]
    owner: head_of_financial_crime_ops
    unit: "%"
    formula:
      type: sql
      sql: "SELECT CAST(on_time AS FLOAT) / NULLIF(total, 0) FROM ..."
    target: { gte: 0.95 }
    thresholds:
      green: { gte: 0.95 }
      amber: { gte: 0.85 }
      red:   { lt:  0.85 }

  - id: avg_resolution_hours
    name: Average case resolution time
    category: operational
    audience: [manager, director]
    owner: head_of_financial_crime_ops
    unit: hours
    formula:
      type: sql
      sql: "SELECT AVG(resolution_hours) FROM ..."
    target: { lte: 48 }
    thresholds:
      green: { lte: 24 }
      amber: { lte: 48 }
      red:   { gt:  48 }

reports:
  - id: svp_exec_brief
    title: SVP executive brief
    audience: svp
    cadence: quarterly
    sections:
      - title: Outcomes
        metrics: [high_severity_alert_ratio, typology_coverage, false_positive_rate]
        commentary: >
          Share of alerts from high-severity typologies, detection coverage,
          and estimated false positive rate for OSFI and board reporting.
      - title: Exposure
        metrics: [distinct_customers_alerted, transaction_volume_cad]
      - title: Program scale
        metrics: [rules_active_count, alert_to_str_rate]

  - id: vp_compliance_review
    title: VP compliance review
    audience: vp
    cadence: monthly
    sections:
      - title: Program effectiveness
        metrics: [typology_coverage, high_severity_alert_ratio, alert_to_str_rate]
      - title: Volume & exposure
        metrics: [alert_volume_total, distinct_customers_alerted]
      - title: Catalogue health
        metrics: [high_severity_rules_active, rules_active_count]

  - id: director_program_health
    title: Director monthly program health
    audience: director
    cadence: monthly
    sections:
      - title: Demand
        metrics: [alert_volume_total, cases_opened, distinct_customers_alerted]
      - title: Coverage
        metrics: [typology_coverage]
      - title: Risk mix
        metrics: [high_severity_alert_ratio]

  - id: manager_weekly
    title: Operations manager weekly
    audience: manager
    cadence: weekly
    sections:
      - title: Queue load
        metrics: [cases_opened, cases_routed_to_l1, alert_volume_total]
      - title: Performance
        metrics: [sla_compliance_rate, avg_resolution_hours]

  - id: pm_delivery
    title: Program PM delivery view
    audience: pm
    cadence: weekly
    sections:
      - title: Rule catalogue
        metrics: [high_severity_rules_active]
      - title: Throughput
        metrics: [cases_routed_to_l1]

  - id: developer_runtime
    title: Platform engineering — rule runtime health
    audience: developer
    cadence: daily
    sections:
      - title: Throughput
        metrics: [alert_volume_total, cases_opened, transaction_volume_cad]
      - title: Catalogue
        metrics: [high_severity_rules_active]

  - id: business_owner_daily
    title: Business owner daily pulse
    audience: business
    cadence: daily
    sections:
      - title: Today's picture
        metrics: [distinct_customers_alerted, transaction_volume_cad]
