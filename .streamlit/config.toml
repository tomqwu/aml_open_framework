[theme]
# The dashboard's full visual identity (light AND dark) is owned by the
# hand-tuned `--dna-*` CSS variables injected in
# src/aml_framework/dashboard/components.py, which flip via an
# `@media (prefers-color-scheme: dark)` block so the app follows the
# OS preference. We deliberately do NOT hard-pin backgroundColor /
# textColor here: a static config.toml can't be scheme-aware, and
# pinning a light canvas left dark-navy ink invisible whenever the OS
# (or Streamlit's own theme switch) went dark. `base` is left to
# Streamlit's default; the injected CSS paints the app container with
# `var(--dna-bg)` and sets text colour from `var(--dna-ink)`, so our
# theme wins in both schemes regardless of the base Streamlit chooses.
primaryColor = "#a44b30"
font = "sans serif"
