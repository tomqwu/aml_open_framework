name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --ignore=tests/test_e2e_dashboard.py --ignore=tests/test_e2e_dashboard_mobile.py --ignore=tests/test_api.py -q

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,api,dashboard]"
      - run: |
          pytest tests/ \
            --ignore=tests/test_e2e_dashboard.py \
            --ignore=tests/test_e2e_dashboard_mobile.py \
            --cov=aml_framework \
            --cov-report=term-missing \
            --cov-fail-under=98 \
            -q

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,api]"
      - run: pytest tests/test_api.py -q

  e2e-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,dashboard]" playwright
      - run: python -m playwright install chromium
      - run: pytest tests/test_e2e_dashboard.py tests/test_e2e_dashboard_mobile.py -q
        # The desktop suite renders every page plus Today / Executive /
        # one persona-specific page for every registered persona. Each
        # Playwright navigation waits for Streamlit to settle, so keep
        # headroom for new personas and pages without per-PR retuning.
        timeout-minutes: 25

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker build -t aml-framework:test .
      - run: |
          docker run --rm aml-framework:test \
            python -m pytest tests/ \
            --ignore=tests/test_e2e_dashboard.py \
            --ignore=tests/test_e2e_dashboard_mobile.py -q

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: aml
          POSTGRES_USER: aml
          POSTGRES_PASSWORD: aml_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aml -d aml"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://aml:aml_dev_password@localhost:5432/aml
      JWT_SECRET: aml-framework-ci-secret-at-least-32-chars
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,api]"
      - run: |
          python - <<'PY'
          from aml_framework.api.db import (
              get_run,
              get_run_alerts,
              get_run_metrics,
              init_db,
              list_runs,
              store_run,
          )

          init_db()
          store_run(
              "ci-postgres-smoke",
              "examples/community_bank/aml.yaml",
              42,
              {"program": {"name": "ci"}},
              {"rule_a": [{"customer_id": "C1"}]},
              [{"id": "m1", "value": 1}],
              tenant_id="bank_a",
          )
          assert get_run("ci-postgres-smoke")["program"]["name"] == "ci"
          alerts = get_run_alerts("ci-postgres-smoke")
          assert alerts[0]["rule_id"] == "rule_a"
          assert alerts[0]["alerts"][0]["customer_id"] == "C1"
          assert get_run_metrics("ci-postgres-smoke")[0]["id"] == "m1"
          assert any(r["run_id"] == "ci-postgres-smoke" for r in list_runs("bank_a"))
          PY

  deployment-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm
      - run: helm template aml-open-framework deploy/helm > /tmp/aml-open-framework.yaml
      - run: docker compose config

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit pip-audit
      - run: bandit -q -r src/ -x src/aml_framework/models/xgboost_scorer.py --severity-level high
      - run: pip-audit --progress-spinner off .
