name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --ignore=tests/test_e2e_dashboard.py --ignore=tests/test_e2e_dashboard_mobile.py --ignore=tests/test_api.py -q

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,api]"
      - run: pytest tests/test_api.py -q

  e2e-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,dashboard]" playwright
      - run: python -m playwright install chromium
      - run: pytest tests/test_e2e_dashboard.py tests/test_e2e_dashboard_mobile.py -q
        # Bumped 8 → 15 minutes after PR-0 / nav-wiring exposed pages
        # 25-31 (and the previously-orphaned 22-24) to the per-page
        # render matrix + the persona × page coverage matrix. Each
        # Playwright navigate cycle takes ~2-3s of stable-load wait,
        # so adding 9 page titles × 12 personas adds ~3-4 minutes.
        # 15 min keeps headroom for future page additions without
        # per-PR retuning of this value.
        timeout-minutes: 15

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker build -t aml-framework:test .
      - run: |
          docker run --rm aml-framework:test \
            python -m pytest tests/ \
            --ignore=tests/test_e2e_dashboard.py \
            --ignore=tests/test_e2e_dashboard_mobile.py -q
