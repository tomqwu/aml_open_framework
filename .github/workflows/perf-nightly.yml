name: Perf nightly

# Run the engine-baseline harness on a schedule (and on demand) so
# perf regressions surface within a day of merge rather than after a
# customer notices. The regular unit-test suite already runs a
# permissive 5× threshold smoke; this workflow tightens to 2× on the
# dedicated runner.

on:
  schedule:
    # 06:00 UTC = late evening US Pacific the previous day. The
    # nightly window catches yesterday's merges before the workday
    # starts in either time zone.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  engine-baseline:
    name: engine baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install -e ".[dev]"

      - name: Capture baseline
        id: capture
        run: |
          set -eu
          python -m tests.perf.run_engine_baseline > out.json
          cat out.json

      - name: Compare against committed baseline
        run: |
          set -eu
          python - <<'PY'
          import json
          import sys

          measured = json.load(open("out.json"))
          expected = json.load(open("tests/perf/expected_baseline.json"))

          THRESHOLD = 2.0  # tighter than the in-suite 5× smoke test
          fails = []
          for stage, exp in expected["stage_seconds"].items():
              act = measured["stage_seconds"][stage]
              if act > exp * THRESHOLD:
                  fails.append(
                      f"{stage}: {act:.3f}s > {exp:.3f}s × {THRESHOLD} ({exp*THRESHOLD:.3f}s)"
                  )
          if fails:
              print("PERF REGRESSION:", file=sys.stderr)
              for f in fails:
                  print(f"  - {f}", file=sys.stderr)
              sys.exit(1)
          print("perf OK — all stages within 2× baseline")
          PY

      - name: Upload measured baseline as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-baseline-${{ github.run_id }}
          path: out.json
          retention-days: 30
