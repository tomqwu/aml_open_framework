name: codex-pr-review-gate

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - converted_to_draft
      - edited
  issue_comment:
    types:
      - created
      - edited
      - deleted
  pull_request_review:
    types:
      - submitted
      - edited
      - dismissed
  pull_request_review_comment:
    types:
      - created
      - edited
      - deleted

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  codex-pr-review-gate:
    name: codex-pr-review-gate
    runs-on: ubuntu-latest
    steps:
      - name: Require current-head Codex review marker
        uses: actions/github-script@v7
        with:
          script: |
            const core = require("@actions/core");

            function getPullRequestNumber() {
              if (context.payload.pull_request) {
                return context.payload.pull_request.number;
              }
              if (context.payload.issue?.pull_request) {
                return context.payload.issue.number;
              }
              return undefined;
            }

            function normalizeBody(body) {
              return (body || "").replace(/\r\n/g, "\n").trim();
            }

            function eventTime(item) {
              return new Date(
                item.submitted_at ||
                  item.updated_at ||
                  item.created_at ||
                  item.dismissed_at ||
                  "1970-01-01T00:00:00Z",
              );
            }

            const pullNumber = getPullRequestNumber();
            if (!pullNumber) {
              core.info("Event is not associated with a pull request.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const markerPattern = /<!--\s*codex-pr-review:\s*([0-9a-f]{40})\s*-->/i;

            const { data: pull } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: pullNumber,
            });

            const headSha = pull.head.sha;
            if (!headSha) {
              core.setFailed("Unable to determine PR head SHA.");
              return;
            }
            if (pull.draft) {
              core.setFailed("Draft PRs cannot pass codex-pr-review-gate.");
              return;
            }

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pullNumber,
              per_page: 100,
            });
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });
            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              {
                owner,
                repo,
                pull_number: pullNumber,
                per_page: 100,
              },
            );

            const entries = [];

            for (const comment of issueComments) {
              entries.push({
                kind: "issue_comment",
                body: normalizeBody(comment.body),
                at: eventTime(comment),
                state: undefined,
                author: comment.user?.login || "unknown",
              });
            }

            for (const review of reviews) {
              entries.push({
                kind: "review",
                body: normalizeBody(review.body),
                at: eventTime(review),
                state: review.state,
                author: review.user?.login || "unknown",
              });
            }

            for (const comment of reviewComments) {
              entries.push({
                kind: "review_comment",
                body: normalizeBody(comment.body),
                at: eventTime(comment),
                state: undefined,
                author: comment.user?.login || "unknown",
              });
            }

            for (const entry of entries) {
              const marker = entry.body.match(markerPattern);
              entry.markerSha = marker ? marker[1].toLowerCase() : undefined;
              entry.isExactLgtm =
                entry.body === `LGTM\n<!-- codex-pr-review: ${headSha} -->`;
              entry.isBlockingMarker =
                entry.markerSha === headSha.toLowerCase() &&
                /\bNot LGTM yet\b/i.test(entry.body);
              entry.isBlockingFeedback =
                entry.isBlockingMarker ||
                /\bNot LGTM yet\b/i.test(entry.body) ||
                /\bchanges requested\b/i.test(entry.body) ||
                entry.state === "CHANGES_REQUESTED";
            }

            const currentHeadMarkers = entries
              .filter(
                (entry) =>
                  entry.markerSha === headSha.toLowerCase() &&
                  (entry.isExactLgtm || entry.isBlockingMarker),
              )
              .sort((a, b) => a.at - b.at);

            if (currentHeadMarkers.length === 0) {
              const staleMarkers = entries
                .filter((entry) => entry.markerSha)
                .map((entry) => entry.markerSha);
              const staleSummary =
                staleMarkers.length > 0
                  ? ` Found stale marker(s): ${[...new Set(staleMarkers)].join(", ")}.`
                  : "";
              core.setFailed(
                `No Codex LGTM marker found for current head ${headSha}.${staleSummary}`,
              );
              return;
            }

            const latestMarker = currentHeadMarkers[currentHeadMarkers.length - 1];
            if (!latestMarker.isExactLgtm) {
              core.setFailed(
                `Latest Codex marker for ${headSha} is blocking, not LGTM.`,
              );
              return;
            }

            const blockersAfterLgtm = entries
              .filter(
                (entry) =>
                  entry.at > latestMarker.at &&
                  entry.isBlockingFeedback,
              )
              .sort((a, b) => a.at - b.at);

            if (blockersAfterLgtm.length > 0) {
              const blocker = blockersAfterLgtm[0];
              core.setFailed(
                `Blocking feedback after LGTM from ${blocker.author} at ${blocker.at.toISOString()}.`,
              );
              return;
            }

            core.info(`Codex PR review gate passed for ${headSha}.`);
