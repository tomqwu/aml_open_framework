image:
  repository: aml-framework
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicas: 1
  port: 8000
  dataRoots: data
  uploadRoot: data/uploads
  artifactRoot: data/api-artifacts
  maxUploadBytes: 26214400
  allowRemoteDataSources: false
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

dashboard:
  replicas: 1
  port: 8501
  spec: examples/canadian_schedule_i_bank/aml.yaml
  seed: 42
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

postgres:
  enabled: true
  image: postgres:16-alpine
  database: aml
  username: aml
  password: aml_dev_password

database:
  url: ""

# Cosmos DB serverless (PR-AZ-10). Alternative persistence backend for
# Azure Sponsorship subscriptions where Postgres Flexible Server is
# region-restricted. When enabled, COSMOS_ENDPOINT + COSMOS_DATABASE
# env vars are wired into the API pod and the Python layer
# (src/aml_framework/api/db.py) selects Cosmos over Postgres/SQLite.
# Auth uses DefaultAzureCredential — pair with workloadIdentityClientId
# + a Cosmos Data Contributor role assignment.
cosmos:
  enabled: false
  endpoint: ""
  database: aml

jwt:
  secret: replace-with-32-plus-byte-random-secret

oidc:
  issuerUrl: ""
  audience: ""
  roleClaim: roles
  tenantClaim: tid
  allowedTenants: ""

ingress:
  enabled: false
  host: aml.example.com

# Azure Kubernetes Service deployment options (PR-AZ-3).
# All fields are optional — leaving them blank produces an Azure-
# agnostic chart identical to the on-prem deployment shape.
#
# When `workloadIdentityClientId` is set, the API + dashboard pods
# pick up the `azure.workload.identity/use=true` label and a
# ServiceAccount with the federated-identity annotation. Combined
# with `keyVaultName`, the SecretsProvider (PR-AZ-2) resolves
# JWT_SECRET / OPENAI_API_KEY etc. from Key Vault without static
# credentials.
#
# `storageAccountName`, `synapseConnString`, `azureSqlConnString`
# are passed through as env vars so the data-source loaders
# (PR-AZ-1) can connect to Azure Blob / ADLS Gen2 / Synapse /
# Azure SQL.
azure:
  workloadIdentityClientId: ""
  keyVaultName: ""
  storageAccountName: ""
  synapseConnString: ""
  azureSqlConnString: ""
