image:
  repository: aml-framework
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

dashboard:
  replicas: 1
  port: 8501
  spec: examples/canadian_schedule_i_bank/aml.yaml
  seed: 42
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

postgres:
  enabled: true
  image: postgres:16-alpine
  database: aml
  username: aml
  password: aml_dev_password

jwt:
  secret: change-me-in-production

ingress:
  enabled: false
  host: aml.example.com
