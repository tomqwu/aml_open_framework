{{- if and (not .Values.postgres.enabled) (not .Values.database.url) }}
{{- fail "database.url is required when postgres.enabled=false" }}
{{- end }}
{{- if and .Values.oidc.issuerUrl (not .Values.oidc.audience) }}
{{- fail "oidc.audience is required when oidc.issuerUrl is set" }}
{{- end }}
{{- if and .Values.azure.workloadIdentityClientId (not .Values.azure.keyVaultName) }}
{{- /* Workload identity is harmless without a Key Vault, but if you set
       the client ID you almost certainly intended to also set the vault
       name. Surface the omission so it's not a silent half-config. */}}
{{- end }}
{{- if .Values.azure.workloadIdentityClientId }}
# PR-AZ-3: ServiceAccount with Azure workload-identity federation.
# The annotation tells AKS to mint an OIDC token that the federated
# identity credential trusts; combined with the pod label below the
# Azure SDK on the container picks the right credential automatically.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-api
  annotations:
    azure.workload.identity/client-id: {{ .Values.azure.workloadIdentityClientId | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  labels:
    app: aml-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: aml-api
  template:
    metadata:
      labels:
        app: aml-api
        {{- if .Values.azure.workloadIdentityClientId }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- if .Values.azure.workloadIdentityClientId }}
      serviceAccountName: {{ .Release.Name }}-api
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "uvicorn", "aml_framework.api.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.api.port }}"]
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: DATABASE_URL
              {{- if .Values.postgres.enabled }}
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Release.Name }}-postgres:5432/{{ .Values.postgres.database }}"
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: database-url
              {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: jwt-secret
            - name: API_DATA_ROOTS
              value: {{ .Values.api.dataRoots | quote }}
            - name: API_UPLOAD_ROOT
              value: {{ .Values.api.uploadRoot | quote }}
            - name: API_ARTIFACT_ROOT
              value: {{ .Values.api.artifactRoot | quote }}
            - name: API_MAX_UPLOAD_BYTES
              value: {{ .Values.api.maxUploadBytes | quote }}
            - name: API_ALLOW_REMOTE_DATA_SOURCES
              value: {{ ternary "1" "0" .Values.api.allowRemoteDataSources | quote }}
            {{- if .Values.oidc.issuerUrl }}
            - name: OIDC_ISSUER_URL
              value: {{ .Values.oidc.issuerUrl | quote }}
            {{- end }}
            {{- if .Values.oidc.audience }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.oidc.audience | quote }}
            {{- end }}
            - name: OIDC_ROLE_CLAIM
              value: {{ .Values.oidc.roleClaim | quote }}
            - name: OIDC_TENANT_CLAIM
              value: {{ .Values.oidc.tenantClaim | quote }}
            {{- if .Values.oidc.allowedTenants }}
            - name: OIDC_ALLOWED_TENANTS
              value: {{ .Values.oidc.allowedTenants | quote }}
            {{- end }}
            # PR-AZ-3: thread Azure env vars through to the SecretsProvider
            # (PR-AZ-2) and the data-source loaders (PR-AZ-1). All
            # optional — empty values are harmless.
            {{- if .Values.azure.keyVaultName }}
            - name: AZURE_KEY_VAULT_NAME
              value: {{ .Values.azure.keyVaultName | quote }}
            {{- end }}
            {{- if .Values.azure.storageAccountName }}
            - name: AZURE_STORAGE_ACCOUNT_NAME
              value: {{ .Values.azure.storageAccountName | quote }}
            {{- end }}
            {{- if .Values.azure.synapseConnString }}
            - name: AZURE_SYNAPSE_CONN
              value: {{ .Values.azure.synapseConnString | quote }}
            {{- end }}
            {{- if .Values.azure.azureSqlConnString }}
            - name: AZURE_SQL_CONN
              value: {{ .Values.azure.azureSqlConnString | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.api.port }}
            initialDelaySeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api
spec:
  selector:
    app: aml-api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
