{{- if .Values.azure.workloadIdentityClientId }}
# PR-AZ-3: ServiceAccount + workload-identity for the dashboard pod.
# Same pattern as the API deployment.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-dashboard
  annotations:
    azure.workload.identity/client-id: {{ .Values.azure.workloadIdentityClientId | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dashboard
  labels:
    app: aml-dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app: aml-dashboard
  template:
    metadata:
      labels:
        app: aml-dashboard
        {{- if .Values.azure.workloadIdentityClientId }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- if .Values.azure.workloadIdentityClientId }}
      serviceAccountName: {{ .Release.Name }}-dashboard
      {{- end }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "streamlit", "run", "src/aml_framework/dashboard/app.py", "--server.port", "{{ .Values.dashboard.port }}", "--server.headless", "true", "--", "{{ .Values.dashboard.spec }}", "{{ .Values.dashboard.seed }}"]
          ports:
            - containerPort: {{ .Values.dashboard.port }}
          env:
            # Persistence env vars must mirror the API pod — dashboard
            # pages call aml_framework.api.db.list_runs() / init_db()
            # directly, so without these the dashboard falls back to
            # local SQLite while the API writes to the configured
            # backend, leaving Run History / Comparative Analytics
            # showing stale-or-empty results.
            #
            # Postgres-first precedence mirrors `_active_backend()` in
            # src/aml_framework/api/db.py.
            {{- if .Values.postgres.enabled }}
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Release.Name }}-postgres:5432/{{ .Values.postgres.database }}"
            {{- else if .Values.cosmos.enabled }}
            - name: COSMOS_ENDPOINT
              value: {{ .Values.cosmos.endpoint | quote }}
            - name: COSMOS_DATABASE
              value: {{ .Values.cosmos.database | quote }}
            {{- end }}
            # PR-AZ-3: Azure env vars threaded through to the dashboard
            # so the SecretsProvider + data-source loaders work.
            {{- if .Values.azure.keyVaultName }}
            - name: AZURE_KEY_VAULT_NAME
              value: {{ .Values.azure.keyVaultName | quote }}
            {{- end }}
            {{- if .Values.azure.storageAccountName }}
            - name: AZURE_STORAGE_ACCOUNT_NAME
              value: {{ .Values.azure.storageAccountName | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dashboard
spec:
  selector:
    app: aml-dashboard
  ports:
    - port: {{ .Values.dashboard.port }}
      targetPort: {{ .Values.dashboard.port }}
