{{- if .Values.azure.workloadIdentityClientId }}
# PR-AZ-3: ServiceAccount + workload-identity for the dashboard pod.
# Same pattern as the API deployment.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-dashboard
  annotations:
    azure.workload.identity/client-id: {{ .Values.azure.workloadIdentityClientId | quote }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dashboard
  labels:
    app: aml-dashboard
spec:
  replicas: {{ .Values.dashboard.replicas }}
  selector:
    matchLabels:
      app: aml-dashboard
  template:
    metadata:
      labels:
        app: aml-dashboard
        {{- if .Values.azure.workloadIdentityClientId }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      {{- if .Values.azure.workloadIdentityClientId }}
      serviceAccountName: {{ .Release.Name }}-dashboard
      {{- end }}
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "streamlit", "run", "src/aml_framework/dashboard/app.py", "--server.port", "{{ .Values.dashboard.port }}", "--server.headless", "true", "--", "{{ .Values.dashboard.spec }}", "{{ .Values.dashboard.seed }}"]
          ports:
            - containerPort: {{ .Values.dashboard.port }}
          env:
            # PR-AZ-3: Azure env vars threaded through to the dashboard
            # so the SecretsProvider + data-source loaders work.
            {{- if .Values.azure.keyVaultName }}
            - name: AZURE_KEY_VAULT_NAME
              value: {{ .Values.azure.keyVaultName | quote }}
            {{- end }}
            {{- if .Values.azure.storageAccountName }}
            - name: AZURE_STORAGE_ACCOUNT_NAME
              value: {{ .Values.azure.storageAccountName | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dashboard
spec:
  selector:
    app: aml-dashboard
  ports:
    - port: {{ .Values.dashboard.port }}
      targetPort: {{ .Values.dashboard.port }}
